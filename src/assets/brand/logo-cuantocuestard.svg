<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 180" width="100%" height="100%">
  <!-- Embedded Icon on the left -->
  <g transform="translate(20, 20)">
    <rect width="140" height="140" rx="30" fill="#2563EB" />
    
    <!-- Peso Symbol scaled -->
    <g transform="scale(0.2734)" fill="#FFFFFF">
      <!-- Vertical stem -->
      <rect x="122" y="118" width="22" height="156" rx="4" />
      <!-- Loop of P -->
      <path d="M122,118 h54 c24,0 42,16 42,39 c0,22 -18,39 -42,39 h-54 Z" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Double horizontal bars -->
      <rect x="100" y="148" width="44" height="12" rx="2" />
      <rect x="100" y="186" width="44" height="12" rx="2" />
    </g>

    <!-- Calculator scaled -->
    <g transform="scale(0.2734)" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
      <rect x="270" y="118" width="120" height="156" rx="22" />
      <line x1="270" y1="184" x2="390" y2="184" />
      <rect x="294" y="206" width="24" height="16" rx="4" fill="#FFFFFF" stroke="none" />
      <rect x="342" y="206" width="24" height="16" rx="4" fill="#FFFFFF" stroke="none" />
      <rect x="294" y="234" width="24" height="16" rx="4" fill="#FFFFFF" stroke="none" />
      <rect x="342" y="234" width="24" height="16" rx="4" fill="#FFFFFF" stroke="none" />
    </g>

    <!-- Growth Bars scaled -->
    <g transform="scale(0.2734)">
      <rect x="136" y="328" width="34" height="58" rx="8" fill="#22C55E" />
      <rect x="186" y="306" width="34" height="80" rx="8" fill="#06B6D4" />
      <rect x="236" y="284" width="34" height="102" rx="8" fill="#F59E0B" />
      <path d="M132,392 C190,388 280,360 348,300" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" />
      <path d="M308,284 L356,292 L348,340 Z" fill="#FFFFFF" />
    </g>
  </g>
  
  <!-- Text on the right -->
  <text x="180" y="114" font-family="'Inter', 'Outfit', 'Segoe UI', sans-serif" font-weight="800" font-size="76" letter-spacing="-2">
    <tspan fill="#0F172A">CuantoCuesta</tspan><tspan fill="#2563EB">RD</tspan>
